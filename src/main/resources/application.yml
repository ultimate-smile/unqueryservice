server:
  port: 8080
  servlet:
    context-path: /

spring:
  application:
    name: unqueryservice

  # Redis connection (override via env vars in Docker)
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      timeout: 3000ms
      lettuce:
        pool:
          max-active: 8
          max-idle: 8
          min-idle: 2
          max-wait: 1000ms

  # Disable auto-configured DataSource (we manage our own via DataSourceRegistry)
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.jdbc.DataSourceAutoConfiguration
      - org.springframework.boot.autoconfigure.orm.jpa.HibernateJpaAutoConfiguration

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: when-authorized

# ============================================================================
# Query-service specific configuration
# ============================================================================
query-service:

  # Default and maximum row limits
  default-row-limit: 1000
  max-row-limit: 10000

  # Redis cache TTL in seconds (set to 0 to disable caching)
  cache-ttl-seconds: 60

  # JWT settings
  jwt:
    # Override this secret via QUERY_SERVICE_JWT_SECRET environment variable in production!
    secret: ${QUERY_SERVICE_JWT_SECRET:CHANGE_ME_IN_PRODUCTION_THIS_MUST_BE_AT_LEAST_256_BITS_LONG!!}
    expiration-ms: 3600000   # 1 hour

  # Named data-source configurations
  # Each key is the logical name clients send in QueryRequest.dataSource
  data-sources:
    # Example: SQLite in-memory database (great for demo / local dev)
    sqlite-demo:
      type: sqlite
      url: "jdbc:sqlite::memory:"
      driver-class-name: org.sqlite.JDBC
      max-pool-size: 5

    # Example: MySQL (uncomment and fill in real credentials)
    # mysql-prod:
    #   type: mysql
    #   url: jdbc:mysql://${MYSQL_HOST:localhost}:3306/${MYSQL_DB:mydb}?useSSL=false&serverTimezone=UTC
    #   username: ${MYSQL_USER:root}
    #   password: ${MYSQL_PASSWORD:secret}
    #   max-pool-size: 20

    # Example: Oracle (uncomment and fill in real credentials)
    # oracle-prod:
    #   type: oracle
    #   url: jdbc:oracle:thin:@${ORACLE_HOST:localhost}:1521/${ORACLE_SID:orcl}
    #   username: ${ORACLE_USER:system}
    #   password: ${ORACLE_PASSWORD:oracle}
    #   driver-class-name: oracle.jdbc.OracleDriver
    #   max-pool-size: 20

    # Example: SQL Server (uncomment and fill in real credentials)
    # sqlserver-prod:
    #   type: sqlserver
    #   url: jdbc:sqlserver://${SQLSERVER_HOST:localhost}:1433;databaseName=${SQLSERVER_DB:mydb};encrypt=true;trustServerCertificate=true
    #   username: ${SQLSERVER_USER:sa}
    #   password: ${SQLSERVER_PASSWORD:YourStrong@Passw0rd}
    #   driver-class-name: com.microsoft.sqlserver.jdbc.SQLServerDriver
    #   max-pool-size: 20

  # Permission rules per data source
  # Keys must match data-source names above
  permissions:
    sqlite-demo:
      allowed-roles:
        - ROLE_ADMIN
        - ROLE_ANALYST
        - ROLE_VIEWER
      masked-columns: []   # No columns masked for demo
      row-filter: ""       # No row-level filter for demo

    # mysql-prod:
    #   allowed-roles:
    #     - ROLE_ADMIN
    #     - ROLE_ANALYST
    #   masked-columns:
    #     - credit_card_number
    #     - ssn
    #   row-filter: "tenant_id = '${user.tenant}'"   # Replaced at runtime

logging:
  level:
    com.unqueryservice: INFO
    org.apache.calcite: WARN
    org.springframework.security: WARN
