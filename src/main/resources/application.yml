server:
  port: 8010
  servlet:
    context-path: /

spring:
  application:
    name: unqueryservice

  # Redis connection (override via env vars in Docker)
  data:
    redis:
      host: ${REDIS_HOST:127.0.0.1}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:zxcde@1}
      timeout: 3000ms
      lettuce:
        pool:
          max-active: 8
          max-idle: 8
          min-idle: 2
          max-wait: 1000ms

  # Disable auto-configured DataSource (we manage our own via DataSourceRegistry)
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.jdbc.DataSourceAutoConfiguration
      - org.springframework.boot.autoconfigure.orm.jpa.HibernateJpaAutoConfiguration

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: when-authorized

# ============================================================================
# Query-service specific configuration
# ============================================================================
query-service:

  # Default and maximum row limits
  default-row-limit: 1000
  max-row-limit: 10000

  # Redis cache TTL in seconds (set to 0 to disable caching)
  cache-ttl-seconds: 60

  # Named data-source configurations
  # Each key is the logical name clients send in QueryRequest.dataSource
  data-sources:

    mysql-orch:
      type: mysql
      url: "jdbc:mysql://${MYSQL_HOST:127.0.0.1}:3306/orch?useSSL=false&serverTimezone=UTC&characterEncoding=UTF-8"
      username: ${MYSQL_USER:root}
      password: ${MYSQL_PASSWORD:W2pLIKgtWz4XunL9pja}
      max-pool-size: 20

    mysql-phoenix:
      type: mysql
      url: "jdbc:mysql://${MYSQL_HOST:127.0.0.1}:3306/phoenix?useSSL=false&serverTimezone=UTC&characterEncoding=UTF-8"
      username: ${MYSQL_USER:root}
      password: ${MYSQL_PASSWORD:W2pLIKgtWz4XunL9pja}
      max-pool-size: 20

    mysql-snpi:
      type: mysql
      url: "jdbc:mysql://${MYSQL_HOST:127.0.0.1}:3306/snpi?useSSL=false&serverTimezone=UTC&characterEncoding=UTF-8"
      username: ${MYSQL_USER:root}
      password: ${MYSQL_PASSWORD:W2pLIKgtWz4XunL9pja}
      max-pool-size: 20

    # Oracle example (override credentials with environment variables before enabling)
    # oracle-prod:
    #   type: oracle
    #   url: "jdbc:oracle:thin:@//${ORACLE_HOST:127.0.0.1}:${ORACLE_PORT:1521}/${ORACLE_SERVICE:ORCLPDB1}"
    #   username: ${ORACLE_USER:app}
    #   password: ${ORACLE_PASSWORD:secret}
    #   schema: ${ORACLE_SCHEMA:APP}
    #   connection-test-query: "SELECT 1 FROM DUAL"
    #   # If ORACLE_USER=sys is unavoidable, set ORACLE_PRIVILEGED_ROLE=sysdba or sysoper.
    #   # Prefer a least-privilege application user for normal queries.
    #   oracle-privileged-role: ${ORACLE_PRIVILEGED_ROLE:}
    #   max-pool-size: 20

    # SQL Server example (override credentials with environment variables before enabling)
    # sqlserver-prod:
    #   type: sqlserver
    #   url: "jdbc:sqlserver://${SQLSERVER_HOST:127.0.0.1}:${SQLSERVER_PORT:1433};databaseName=${SQLSERVER_DATABASE:app};encrypt=true;trustServerCertificate=true"
    #   username: ${SQLSERVER_USER:sa}
    #   password: ${SQLSERVER_PASSWORD:secret}
    #   schema: ${SQLSERVER_SCHEMA:dbo}
    #   connection-test-query: "SELECT 1"
    #   max-pool-size: 20

logging:
  level:
    com.unqueryservice: INFO
    org.apache.calcite: WARN
